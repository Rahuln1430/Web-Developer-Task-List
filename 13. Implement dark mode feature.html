<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode Toggle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
    color:#222;
    transition:0.3s;
}

body.dark{
    background:#121212;
    color:#f5f5f5;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:#2563eb;
    color:#fff;
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:0.3s;
}

body.dark .card{
    background:#1e1e1e;
    color:#fff;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:#fff;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>
<body>

<header>
<h2>Dark Mode Demo</h2>
<button id="themeBtn">🌙 Dark Mode</button>
</header>

<div class="container">
    <div class="card">
        <h1>Welcome</h1>
        <p>
            Click the button above to switch between Light and Dark Mode.
            Your preference is automatically saved in your browser.
        </p>
    </div>
</div>

<script>
const button = document.getElementById("themeBtn");

// Load saved theme
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
    button.textContent = "☀️ Light Mode";
}

button.addEventListener("click", () => {
    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
        button.textContent = "☀️ Light Mode";
    }else{
        localStorage.setItem("theme","light");
        button.textContent = "🌙 Dark Mode";
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot Integration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-container{
    width:400px;
    height:600px;
    background:#fff;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.chat-header{
    background:#2563eb;
    color:#fff;
    padding:18px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:#f8fafc;
}

.message{
    margin:10px 0;
    padding:10px 15px;
    border-radius:12px;
    max-width:80%;
    word-wrap:break-word;
}

.user{
    background:#2563eb;
    color:#fff;
    margin-left:auto;
}

.bot{
    background:#e5e7eb;
    color:#333;
}

.chat-input{
    display:flex;
    padding:15px;
    border-top:1px solid #ddd;
}

.chat-input input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.chat-input button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    background:#2563eb;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}

.chat-input button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        AI Chatbot
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Hello! How can I help you today?
        </div>
    </div>

    <div class="chat-input">
        <input
            type="text"
            id="userInput"
            placeholder="Type your message..."
            onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
async function sendMessage(){

    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");

    const text = input.value.trim();

    if(text === "") return;

    chatBox.innerHTML += `
        <div class="message user">${text}</div>
    `;

    input.value = "";

    chatBox.scrollTop = chatBox.scrollHeight;

    try{

        // Replace with your backend chatbot endpoint
        const response = await fetch("/chat",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                message:text
            })

        });

        const data = await response.json();

        chatBox.innerHTML += `
            <div class="message bot">
                ${data.reply}
            </div>
        `;

    }catch(error){

        chatBox.innerHTML += `
            <div class="message bot">
                Unable to connect to the chatbot server.
            </div>
        `;

    }

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fb;
    padding:40px 20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    color:#1e293b;
    margin-bottom:30px;
}

#search{
    width:100%;
    padding:15px;
    border:2px solid #2563eb;
    border-radius:10px;
    font-size:16px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.card h3{
    margin:15px 0 10px;
}

.price{
    color:#2563eb;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>Search Products</h1>

<input
type="text"
id="search"
placeholder="Search products...">

<div class="grid" id="productGrid">

<div class="card">
<img src="https://picsum.photos/300/200?1" alt="">
<h3>Wireless Headphones</h3>
<p class="price">$89</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2" alt="">
<h3>Smart Watch</h3>
<p class="price">$149</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3" alt="">
<h3>Running Shoes</h3>
<p class="price">$69</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?4" alt="">
<h3>Laptop Backpack</h3>
<p class="price">$49</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?5" alt="">
<h3>Bluetooth Speaker</h3>
<p class="price">$59</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?6" alt="">
<h3>Gaming Mouse</h3>
<p class="price">$39</p>
</div>

</div>

</div>

<script>
const searchInput = document.getElementById("search");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("keyup", function () {

    const searchValue = this.value.toLowerCase();

    cards.forEach(card => {

        const productName = card.querySelector("h3")
            .textContent
            .toLowerCase();

        if(productName.includes(searchValue)){
            card.style.display = "block";
        }else{
            card.style.display = "none";
        }

    });

});
</script>

</body>
</html>

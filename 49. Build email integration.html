<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Integration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#444;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

textarea{
    resize:vertical;
    height:120px;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}
</style>

</head>
<body>

<div class="container">
    <h2>Email Integration</h2>

    <div class="form-group">
        <label>Recipient Email</label>
        <input type="email" id="to" placeholder="example@email.com">
    </div>

    <div class="form-group">
        <label>Subject</label>
        <input type="text" id="subject" placeholder="Enter subject">
    </div>

    <div class="form-group">
        <label>Message</label>
        <textarea id="message" placeholder="Write your message..."></textarea>
    </div>

    <button onclick="sendEmail()">Send Email</button>
</div>

<script>
function sendEmail() {
    const to = document.getElementById("to").value;
    const subject = encodeURIComponent(document.getElementById("subject").value);
    const message = encodeURIComponent(document.getElementById("message").value);

    if(to === ""){
        alert("Please enter the recipient's email address.");
        return;
    }

    window.location.href =
        `mailto:${to}?subject=${subject}&body=${message}`;
}
</script>

</body>
</html>

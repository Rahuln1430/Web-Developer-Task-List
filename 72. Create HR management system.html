<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Management System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fc;
}

.wrapper{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:260px;
    background:#1e3a8a;
    color:#fff;
    padding:20px;
}

.sidebar h2{
    margin-bottom:30px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:14px;
    margin-bottom:8px;
    border-radius:8px;
    cursor:pointer;
}

.sidebar ul li:hover{
    background:#2563eb;
}

.sidebar i{
    margin-right:10px;
}

.main{
    flex:1;
    padding:25px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.header input{
    width:260px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,.08);
}

.card h3{
    color:#666;
}

.card h2{
    color:#2563eb;
    margin-top:10px;
}

.form-box,
.table-box{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.form-grid input,
.form-grid select{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:#fff;
}

.add{
    background:#2563eb;
}

.edit{
    background:#f59e0b;
}

.delete{
    background:#dc2626;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#2563eb;
    color:#fff;
}

.active{
    color:#16a34a;
    font-weight:bold;
}

.leave{
    color:#f59e0b;
    font-weight:bold;
}

@media(max-width:768px){

.wrapper{
    flex-direction:column;
}

.sidebar{
    width:100%;
}

.header input{
    width:100%;
    margin-top:15px;
}

table{
    display:block;
    overflow-x:auto;
}

}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h2><i class="fas fa-users"></i> HRMS</h2>

<ul>
<li><i class="fas fa-chart-line"></i> Dashboard</li>
<li><i class="fas fa-user-tie"></i> Employees</li>
<li><i class="fas fa-calendar-check"></i> Attendance</li>
<li><i class="fas fa-money-check-alt"></i> Payroll</li>
<li><i class="fas fa-file-alt"></i> Leave</li>
<li><i class="fas fa-chart-pie"></i> Reports</li>
<li><i class="fas fa-cog"></i> Settings</li>
</ul>

</div>

<div class="main">

<div class="header">

<h1>HR Management System</h1>

<input
type="text"
id="search"
placeholder="Search employee..."
onkeyup="searchEmployee()">

</div>

<div class="cards">

<div class="card">
<h3>Total Employees</h3>
<h2 id="totalEmp">0</h2>
</div>

<div class="card">
<h3>Departments</h3>
<h2>6</h2>
</div>

<div class="card">
<h3>Attendance</h3>
<h2>96%</h2>
</div>

<div class="card">
<h3>Pending Leave</h3>
<h2>8</h2>
</div>

</div>

<div class="form-box">

<h2>Add Employee</h2>
<br>

<div class="form-grid">

<input type="text" id="name" placeholder="Employee Name">

<input type="text" id="id" placeholder="Employee ID">

<input type="text" id="department" placeholder="Department">

<select id="status">
<option>Active</option>
<option>On Leave</option>
</select>

</div>

<br>

<button class="add" onclick="addEmployee()">
Add Employee
</button>

</div>

<div class="table-box">

<h2>Employee Records</h2>

<table id="employeeTable">

<thead>

<tr>
<th>Name</th>
<th>ID</th>
<th>Department</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<script>

function addEmployee(){

let name=document.getElementById("name").value;
let id=document.getElementById("id").value;
let dept=document.getElementById("department").value;
let status=document.getElementById("status").value;

if(name==""||id==""||dept==""){
alert("Please fill all fields");
return;
}

let cls=status=="Active"?"active":"leave";

let row=document.querySelector("#employeeTable tbody").insertRow();

row.innerHTML=`
<td>${name}</td>
<td>${id}</td>
<td>${dept}</td>
<td class="${cls}">${status}</td>
<td>
<button class="edit" onclick="editEmployee(this)">Edit</button>
<button class="delete" onclick="deleteEmployee(this)">Delete</button>
</td>
`;

clearForm();
updateCount();

}

function editEmployee(btn){

let row=btn.parentNode.parentNode;

name.value=row.cells[0].innerText;
id.value=row.cells[1].innerText;
department.value=row.cells[2].innerText;
status.value=row.cells[3].innerText;

row.remove();

updateCount();

}

function deleteEmployee(btn){

btn.parentNode.parentNode.remove();

updateCount();

}

function clearForm(){

name.value="";
id.value="";
department.value="";
status.selectedIndex=0;

}

function searchEmployee(){

let value=search.value.toLowerCase();

document.querySelectorAll("#employeeTable tbody tr")
.forEach(row=>{

row.style.display=row.innerText.toLowerCase().includes(value)
?"":"none";

});

}

function updateCount(){

document.getElementById("totalEmp").innerText=
document.querySelectorAll("#employeeTable tbody tr").length;

}

</script>

</body>
</html>

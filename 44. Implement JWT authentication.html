<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Authentication Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-card{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:20px;
}

label{
    display:block;
    margin:12px 0 5px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#0d6efd;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0b5ed7;
}

#message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="login-card">

<h2>Login</h2>

<form id="loginForm">

<label>Email</label>
<input type="email" id="email" required>

<label>Password</label>
<input type="password" id="password" required>

<button type="submit">Login</button>

</form>

<div id="message"></div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try{

        const response = await fetch("/api/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email,
                password
            })
        });

        const data = await response.json();

        if(response.ok){

            localStorage.setItem("token", data.token);

            document.getElementById("message").innerHTML =
            "Login successful! JWT saved.";

        }else{

            document.getElementById("message").innerHTML =
            data.message || "Login failed.";

        }

    }catch(error){

        document.getElementById("message").innerHTML =
        "Unable to connect to the server.";

    }

});
</script>

</body>
</html>

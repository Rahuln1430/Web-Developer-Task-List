<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Management Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#0d6efd;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0b5ed7;
}

#status{
    margin-top:20px;
    text-align:center;
    color:#198754;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>User Login</h2>

<form id="loginForm">

<label>Email</label>
<input
type="email"
id="email"
placeholder="Enter email"
required>

<label>Password</label>
<input
type="password"
id="password"
placeholder="Enter password"
required>

<button type="submit">
Login
</button>

</form>

<div id="status"></div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

const response=await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password
}),

credentials:"include"
});

const result=await response.json();

document.getElementById("status").textContent=result.message;

}catch{

document.getElementById("status").textContent="Server unavailable.";

}

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REST API Documentation</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
}
.endpoint{
    border-left:6px solid #2196F3;
    padding:15px;
    margin:15px 0;
    background:#fafafa;
}
.method{
    display:inline-block;
    padding:5px 10px;
    border-radius:5px;
    color:#fff;
    font-weight:bold;
}
.get{background:#4CAF50;}
.post{background:#2196F3;}
.put{background:#FF9800;}
.delete{background:#F44336;}
code{
    display:block;
    background:#272822;
    color:#fff;
    padding:10px;
    border-radius:5px;
    overflow:auto;
}
</style>
</head>
<body>

<div class="container">
<h1>REST API Documentation</h1>

<div class="endpoint">
<span class="method get">GET</span>
<h3>/api/users</h3>
<p>Returns all users.</p>
<code>[
  {
    "id":1,
    "name":"John"
  }
]</code>
</div>

<div class="endpoint">
<span class="method post">POST</span>
<h3>/api/users</h3>
<p>Create a new user.</p>
<code>{
  "name":"John"
}</code>
</div>

<div class="endpoint">
<span class="method put">PUT</span>
<h3>/api/users/1</h3>
<p>Update user information.</p>
<code>{
  "name":"Updated Name"
}</code>
</div>

<div class="endpoint">
<span class="method delete">DELETE</span>
<h3>/api/users/1</h3>
<p>Delete a user.</p>
</div>

</div>

</body>
</html>

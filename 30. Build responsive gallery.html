<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fb;
    color:#333;
}

header{
    background:#2563eb;
    color:#fff;
    text-align:center;
    padding:50px 20px;
}

header h1{
    font-size:42px;
    margin-bottom:10px;
}

header p{
    font-size:18px;
}

.gallery{
    max-width:1200px;
    margin:50px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:12px;
    background:#fff;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    display:block;
    transition:.4s;
}

.card:hover img{
    transform:scale(1.08);
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(37,99,235,.75);
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:.3s;
    text-align:center;
    padding:20px;
}

.card:hover .overlay{
    opacity:1;
}

.overlay h3{
    margin-bottom:10px;
    font-size:24px;
}

.overlay p{
    font-size:15px;
}

footer{
    background:#111827;
    color:#fff;
    text-align:center;
    padding:20px;
    margin-top:50px;
}

@media(max-width:768px){

header h1{
    font-size:32px;
}

header p{
    font-size:16px;
}

.gallery{
    grid-template-columns:1fr;
}

.card img{
    height:220px;
}

}
</style>
</head>

<body>

<header>
<h1>Responsive Gallery</h1>
<p>Modern CSS Grid Image Gallery</p>
</header>

<section class="gallery">

<div class="card">
<img src="https://picsum.photos/600/400?1" alt="Mountain">
<div class="overlay">
<h3>Mountains</h3>
<p>Beautiful mountain landscape.</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/600/400?2" alt="Beach">
<div class="overlay">
<h3>Beach</h3>
<p>Relaxing ocean view.</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/600/400?3" alt="Forest">
<div class="overlay">
<h3>Forest</h3>
<p>Peaceful green forest.</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/600/400?4" alt="City">
<div class="overlay">
<h3>City</h3>
<p>Modern urban skyline.</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/600/400?5" alt="Desert">
<div class="overlay">
<h3>Desert</h3>
<p>Golden sand dunes.</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/600/400?6" alt="Lake">
<div class="overlay">
<h3>Lake</h3>
<p>Crystal clear lake scenery.</p>
</div>
</div>

</section>

<footer>
<p>&copy; 2026 Responsive Gallery. All Rights Reserved.</p>
</footer>

</body>
</html>

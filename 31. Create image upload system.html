<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Upload</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    text-align:center;
}

h2{
    color:#2563eb;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:20px;
}

.upload-box{
    border:2px dashed #2563eb;
    border-radius:12px;
    padding:40px 20px;
    cursor:pointer;
    transition:.3s;
}

.upload-box:hover{
    background:#eef4ff;
}

.upload-box input{
    display:none;
}

.upload-btn{
    display:inline-block;
    padding:12px 25px;
    background:#2563eb;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

.preview{
    margin-top:25px;
}

.preview img{
    max-width:100%;
    border-radius:12px;
    display:none;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.file-name{
    margin-top:12px;
    color:#555;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#16a34a;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#15803d;
}

@media(max-width:600px){
.container{
    padding:20px;
}
}
</style>
</head>

<body>

<div class="container">

<h2>Image Upload</h2>
<p>Select an image to preview before uploading.</p>

<label class="upload-box">
<input type="file" id="imageInput" accept="image/*">
<div>📷</div>
<div class="upload-btn">Choose Image</div>
</label>

<div class="preview">
<img id="previewImage" alt="Preview">
<div class="file-name" id="fileName"></div>
</div>

<button type="button">Upload Image</button>

</div>

<script>
const input = document.getElementById("imageInput");
const preview = document.getElementById("previewImage");
const fileName = document.getElementById("fileName");

input.addEventListener("change", function () {

    const file = this.files[0];

    if(file){

        fileName.textContent = file.name;

        const reader = new FileReader();

        reader.onload = function(e){
            preview.src = e.target.result;
            preview.style.display = "block";
        };

        reader.readAsDataURL(file);
    }

});
</script>

</body>
</html>

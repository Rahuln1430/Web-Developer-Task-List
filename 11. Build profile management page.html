<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Management</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
    color:#333;
}

/* Header */
header{
    background:#2563eb;
    color:#fff;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:26px;
}

header a{
    color:#fff;
    text-decoration:none;
    background:rgba(255,255,255,.2);
    padding:10px 18px;
    border-radius:8px;
}

/* Container */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:320px 1fr;
    gap:30px;
}

/* Profile Card */
.profile-card{
    background:#fff;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.avatar{
    width:120px;
    height:120px;
    margin:0 auto 20px;
    border-radius:50%;
    background:#2563eb;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    font-weight:bold;
}

.profile-card h2{
    margin-bottom:8px;
}

.profile-card p{
    color:#64748b;
    margin-bottom:20px;
}

.profile-card button{
    padding:12px 20px;
    border:none;
    background:#2563eb;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}

/* Form */
.form-card{
    background:#fff;
    border-radius:15px;
    padding:30px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.form-card h2{
    margin-bottom:25px;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.group{
    margin-bottom:20px;
}

.group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.group input,
.group textarea,
.group select{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:15px;
    outline:none;
}

.group input:focus,
.group textarea:focus,
.group select:focus{
    border-color:#2563eb;
}

textarea{
    resize:vertical;
}

.actions{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.save-btn{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
}

.cancel-btn{
    background:#e5e7eb;
    color:#333;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
}

/* Responsive */
@media(max-width:768px){

.container{
    grid-template-columns:1fr;
}

.row{
    grid-template-columns:1fr;
}

header{
    flex-direction:column;
    gap:15px;
    text-align:center;
}

.actions{
    flex-direction:column;
}

}
</style>

</head>
<body>

<header>
<h1>Profile Management</h1>
<a href="#">Dashboard</a>
</header>

<div class="container">

<!-- Profile Card -->
<div class="profile-card">

<div class="avatar">A</div>

<h2>Admin User</h2>
<p>admin@example.com</p>

<button>Change Photo</button>

</div>

<!-- Profile Form -->
<div class="form-card">

<h2>Edit Profile</h2>

<form>

<div class="row">

<div class="group">
<label>First Name</label>
<input type="text" value="Admin">
</div>

<div class="group">
<label>Last Name</label>
<input type="text" value="User">
</div>

</div>

<div class="row">

<div class="group">
<label>Email</label>
<input type="email" value="admin@example.com">
</div>

<div class="group">
<label>Phone</label>
<input type="tel" value="+91 98765 43210">
</div>

</div>

<div class="group">
<label>Department</label>
<select>
<option>Administration</option>
<option>Marketing</option>
<option>Sales</option>
<option>Support</option>
</select>
</div>

<div class="group">
<label>Address</label>
<textarea rows="4" placeholder="Enter your address"></textarea>
</div>

<div class="actions">
<button type="submit" class="save-btn">Save Changes</button>
<button type="reset" class="cancel-btn">Cancel</button>
</div>

</form>

</div>

</div>

</body>
</html>

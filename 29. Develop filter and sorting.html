<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Filter & Sorting</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f7fb;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#1e293b;
}

.controls{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:space-between;
    margin-bottom:30px;
}

select{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    min-width:220px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    text-align:center;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.card h3{
    margin:15px 0 8px;
}

.category{
    color:#64748b;
    margin-bottom:8px;
}

.price{
    color:#2563eb;
    font-size:20px;
    font-weight:bold;
}

@media(max-width:768px){
.controls{
    flex-direction:column;
}
select{
    width:100%;
}
}
</style>
</head>

<body>

<div class="container">

<h1>Filter & Sort Products</h1>

<div class="controls">

<select id="categoryFilter">
<option value="all">All Categories</option>
<option value="Electronics">Electronics</option>
<option value="Fashion">Fashion</option>
<option value="Accessories">Accessories</option>
</select>

<select id="sortPrice">
<option value="default">Sort by</option>
<option value="low-high">Price: Low to High</option>
<option value="high-low">Price: High to Low</option>
</select>

</div>

<div class="grid" id="productGrid">

<div class="card" data-category="Electronics" data-price="89">
<img src="https://picsum.photos/300/200?1" alt="">
<h3>Wireless Headphones</h3>
<p class="category">Electronics</p>
<p class="price">$89</p>
</div>

<div class="card" data-category="Electronics" data-price="149">
<img src="https://picsum.photos/300/200?2" alt="">
<h3>Smart Watch</h3>
<p class="category">Electronics</p>
<p class="price">$149</p>
</div>

<div class="card" data-category="Fashion" data-price="69">
<img src="https://picsum.photos/300/200?3" alt="">
<h3>Running Shoes</h3>
<p class="category">Fashion</p>
<p class="price">$69</p>
</div>

<div class="card" data-category="Accessories" data-price="49">
<img src="https://picsum.photos/300/200?4" alt="">
<h3>Laptop Backpack</h3>
<p class="category">Accessories</p>
<p class="price">$49</p>
</div>

</div>

</div>

<script>
const filter=document.getElementById("categoryFilter");
const sort=document.getElementById("sortPrice");
const grid=document.getElementById("productGrid");

function updateProducts(){

let cards=[...grid.children];

// Filter
cards.forEach(card=>{
const match=filter.value==="all"||
card.dataset.category===filter.value;
card.style.display=match?"block":"none";
});

// Sort
cards.sort((a,b)=>{
const p1=Number(a.dataset.price);
const p2=Number(b.dataset.price);

if(sort.value==="low-high") return p1-p2;
if(sort.value==="high-low") return p2-p1;
return 0;
});

cards.forEach(card=>grid.appendChild(card));

}

filter.addEventListener("change",updateProducts);
sort.addEventListener("change",updateProducts);
</script>

</body>
</html>

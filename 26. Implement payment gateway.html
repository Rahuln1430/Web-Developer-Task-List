<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Gateway UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.payment-card{
    width:100%;
    max-width:450px;
    background:#fff;
    padding:35px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    color:#2563eb;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:15px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.summary{
    background:#eef4ff;
    border-radius:10px;
    padding:15px;
    margin:20px 0;
}

.summary div{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.total{
    font-weight:bold;
    font-size:18px;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#message{
    margin-top:15px;
    text-align:center;
    color:#16a34a;
    font-weight:bold;
}

@media(max-width:480px){
    .row{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="payment-card">

<h2>Secure Payment</h2>

<form id="paymentForm">

<div class="form-group">
<label>Cardholder Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Card Number</label>
<input type="text" maxlength="19" placeholder="1234 5678 9012 3456" required>
</div>

<div class="row">

<div class="form-group">
<label>Expiry Date</label>
<input type="month" required>
</div>

<div class="form-group">
<label>CVV</label>
<input type="password" maxlength="4" required>
</div>

</div>

<div class="summary">
<div><span>Subtotal</span><span>$249.00</span></div>
<div><span>Tax</span><span>$20.00</span></div>
<div class="total"><span>Total</span><span>$269.00</span></div>
</div>

<button type="submit">Pay Now</button>

</form>

<p id="message"></p>

</div>

<script>
document.getElementById("paymentForm").addEventListener("submit", function(e){
    e.preventDefault();
    document.getElementById("message").textContent =
        "Demo payment submitted successfully.";
});
</script>

</body>
</html>

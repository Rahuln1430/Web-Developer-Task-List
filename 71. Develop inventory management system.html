<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Management System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fc;
}

.container{
    max-width:1300px;
    margin:30px auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.header h1{
    color:#2563eb;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,.08);
}

.card h3{
    color:#555;
}

.card h2{
    margin-top:10px;
    color:#2563eb;
}

.form-box{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

input,select{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:#fff;
}

.add-btn{
    background:#2563eb;
}

.reset-btn{
    background:#6b7280;
}

.search{
    width:100%;
    margin:20px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    box-shadow:0 6px 15px rgba(0,0,0,.08);
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

th{
    background:#2563eb;
    color:#fff;
    text-align:left;
}

.instock{
    color:#16a34a;
    font-weight:bold;
}

.lowstock{
    color:#f59e0b;
    font-weight:bold;
}

.outstock{
    color:#dc2626;
    font-weight:bold;
}

.edit{
    background:#f59e0b;
}

.delete{
    background:#dc2626;
}

@media(max-width:768px){

table{
    display:block;
    overflow-x:auto;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1><i class="fas fa-boxes"></i> Inventory Management System</h1>
</div>

<div class="dashboard">

<div class="card">
<h3>Total Products</h3>
<h2 id="totalProducts">0</h2>
</div>

<div class="card">
<h3>In Stock</h3>
<h2 id="stockCount">0</h2>
</div>

<div class="card">
<h3>Low Stock</h3>
<h2 id="lowCount">0</h2>
</div>

<div class="card">
<h3>Categories</h3>
<h2>5</h2>
</div>

</div>

<div class="form-box">

<div class="form-grid">

<input type="text" id="product" placeholder="Product Name">

<input type="text" id="code" placeholder="Product Code">

<input type="number" id="qty" placeholder="Quantity">

<select id="status">
<option>In Stock</option>
<option>Low Stock</option>
<option>Out of Stock</option>
</select>

</div>

<br>

<button class="add-btn" onclick="addProduct()">
Add Product
</button>

<button class="reset-btn" onclick="clearForm()">
Reset
</button>

</div>

<input
class="search"
id="search"
type="text"
placeholder="Search products..."
onkeyup="searchTable()">

<table id="inventoryTable">

<thead>

<tr>
<th>Product</th>
<th>Code</th>
<th>Quantity</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

function addProduct(){

const product=document.getElementById("product").value;
const code=document.getElementById("code").value;
const qty=document.getElementById("qty").value;
const status=document.getElementById("status").value;

if(product===""||code===""||qty===""){
alert("Fill all fields");
return;
}

let cls="instock";

if(status==="Low Stock") cls="lowstock";
if(status==="Out of Stock") cls="outstock";

const row=document.querySelector("#inventoryTable tbody").insertRow();

row.innerHTML=`
<td>${product}</td>
<td>${code}</td>
<td>${qty}</td>
<td class="${cls}">${status}</td>
<td>
<button class="edit" onclick="editRow(this)">Edit</button>
<button class="delete" onclick="deleteRow(this)">Delete</button>
</td>
`;

clearForm();
updateStats();

}

function editRow(btn){

const row=btn.parentNode.parentNode;

document.getElementById("product").value=row.cells[0].innerText;
document.getElementById("code").value=row.cells[1].innerText;
document.getElementById("qty").value=row.cells[2].innerText;
document.getElementById("status").value=row.cells[3].innerText;

row.remove();

updateStats();

}

function deleteRow(btn){

btn.parentNode.parentNode.remove();

updateStats();

}

function clearForm(){

product.value="";
code.value="";
qty.value="";
status.selectedIndex=0;

}

function searchTable(){

let value=search.value.toLowerCase();

document.querySelectorAll("#inventoryTable tbody tr")
.forEach(row=>{

row.style.display=row.innerText
.toLowerCase()
.includes(value)
?"":"none";

});

}

function updateStats(){

let rows=document.querySelectorAll("#inventoryTable tbody tr");

document.getElementById("totalProducts").innerText=rows.length;

let stock=0;
let low=0;

rows.forEach(r=>{

let s=r.cells[3].innerText;

if(s==="In Stock") stock++;

if(s==="Low Stock") low++;

});

document.getElementById("stockCount").innerText=stock;
document.getElementById("lowCount").innerText=low;

}

</script>

</body>
</html>

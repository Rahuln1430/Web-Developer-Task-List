<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI/CD Pipeline Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fb;
    color:#333;
}

header{
    background:#2c3e50;
    color:#fff;
    text-align:center;
    padding:25px;
}

.container{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

.pipeline{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.stage{
    flex:1;
    min-width:150px;
    background:#fff;
    padding:20px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    transition:.3s;
}

.stage:hover{
    transform:translateY(-5px);
}

.arrow{
    font-size:30px;
    color:#3498db;
}

.success{
    color:green;
    font-weight:bold;
    margin-top:10px;
}

button{
    margin-top:30px;
    display:block;
    margin-left:auto;
    margin-right:auto;
    padding:12px 25px;
    border:none;
    background:#3498db;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2980b9;
}

#result{
    text-align:center;
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>

</head>
<body>

<header>
<h1>CI/CD Pipeline Dashboard</h1>
<p>Continuous Integration & Continuous Deployment Workflow</p>
</header>

<div class="container">

<div class="pipeline">

<div class="stage">
<h3>Code</h3>
<p>Developer commits code</p>
</div>

<div class="arrow">➜</div>

<div class="stage">
<h3>Build</h3>
<p>Compile application</p>
</div>

<div class="arrow">➜</div>

<div class="stage">
<h3>Test</h3>
<p>Run automated tests</p>
</div>

<div class="arrow">➜</div>

<div class="stage">
<h3>Deploy</h3>
<p>Deploy to server</p>
</div>

<div class="arrow">➜</div>

<div class="stage">
<h3>Monitor</h3>
<p>Track application health</p>
</div>

</div>

<button onclick="runPipeline()">Run Pipeline</button>

<div id="result"></div>

</div>

<script>
function runPipeline(){

const result=document.getElementById("result");

result.innerHTML="🚀 Pipeline Started...";

setTimeout(()=>{
result.innerHTML="✅ Build Successful";
},1000);

setTimeout(()=>{
result.innerHTML="✅ Tests Passed";
},2000);

setTimeout(()=>{
result.innerHTML="✅ Deployment Successful";
},3000);

setTimeout(()=>{
result.innerHTML="🎉 CI/CD Pipeline Completed Successfully!";
},4000);

}
</script>

</body>
</html>

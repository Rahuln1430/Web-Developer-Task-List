<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Storage Application</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
}

.wrapper{
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:#2563eb;
    color:#fff;
    padding:20px;
}

.sidebar h2{
    margin-bottom:30px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    padding:14px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:8px;
}

.sidebar li:hover{
    background:#1d4ed8;
}

.sidebar i{
    margin-right:10px;
}

/* Main */

.main{
    flex:1;
    padding:25px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.header input{
    width:260px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

/* Dashboard */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
    color:#666;
}

.card h2{
    color:#2563eb;
    margin-top:10px;
}

/* Upload */

.upload-box{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.upload-box input{
    margin:15px 0;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:#fff;
    background:#2563eb;
}

button:hover{
    background:#1d4ed8;
}

/* File Table */

.table-box{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

th{
    background:#2563eb;
    color:#fff;
    text-align:left;
}

.download{
    background:#16a34a;
}

.delete{
    background:#dc2626;
}

@media(max-width:768px){

.wrapper{
    flex-direction:column;
}

.sidebar{
    width:100%;
}

.header input{
    width:100%;
    margin-top:15px;
}

table{
    display:block;
    overflow-x:auto;
}

}
</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h2><i class="fas fa-cloud"></i> CloudDrive</h2>

<ul>
<li><i class="fas fa-home"></i> Dashboard</li>
<li><i class="fas fa-folder"></i> My Files</li>
<li><i class="fas fa-share-alt"></i> Shared Files</li>
<li><i class="fas fa-clock"></i> Recent</li>
<li><i class="fas fa-trash"></i> Trash</li>
<li><i class="fas fa-cog"></i> Settings</li>
</ul>

</div>

<div class="main">

<div class="header">

<h1>Cloud Storage Dashboard</h1>

<input
type="text"
id="search"
placeholder="Search files..."
onkeyup="searchFiles()">

</div>

<div class="cards">

<div class="card">
<h3>Total Files</h3>
<h2 id="totalFiles">0</h2>
</div>

<div class="card">
<h3>Storage Used</h3>
<h2>12.8 GB</h2>
</div>

<div class="card">
<h3>Available</h3>
<h2>87.2 GB</h2>
</div>

<div class="card">
<h3>Shared Files</h3>
<h2>18</h2>
</div>

</div>

<div class="upload-box">

<h2>Upload File</h2>

<input type="file" id="fileInput">

<br>

<button onclick="uploadFile()">
Upload
</button>

</div>

<div class="table-box">

<h2>My Files</h2>

<table id="fileTable">

<thead>

<tr>
<th>File Name</th>
<th>Type</th>
<th>Size</th>
<th>Actions</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<script>

function uploadFile(){

let input=document.getElementById("fileInput");

if(input.files.length===0){

alert("Please select a file.");

return;

}

let file=input.files[0];

let row=document.querySelector("#fileTable tbody").insertRow();

row.innerHTML=`
<td>${file.name}</td>
<td>${file.type || "Unknown"}</td>
<td>${(file.size/1024).toFixed(1)} KB</td>

<td>

<button class="download"
onclick="alert('Demo Download')">
Download
</button>

<button class="delete"
onclick="deleteFile(this)">
Delete
</button>

</td>
`;

updateCount();

input.value="";

}

function deleteFile(btn){

btn.parentNode.parentNode.remove();

updateCount();

}

function updateCount(){

document.getElementById("totalFiles").innerText=
document.querySelectorAll("#fileTable tbody tr").length;

}

function searchFiles(){

let value=search.value.toLowerCase();

document.querySelectorAll("#fileTable tbody tr")
.forEach(row=>{

row.style.display=row.innerText.toLowerCase().includes(value)
? ""
: "none";

});

}

</script>

</body>
</html>

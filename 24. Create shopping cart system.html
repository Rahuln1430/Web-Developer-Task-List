<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
    color:#333;
}

.container{
    max-width:1200px;
    margin:40px auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#1e293b;
}

.cart{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

/* Cart Items */
.cart-items{
    background:#fff;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.item{
    display:flex;
    gap:20px;
    align-items:center;
    padding:20px 0;
    border-bottom:1px solid #eee;
}

.item:last-child{
    border-bottom:none;
}

.item img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

.details{
    flex:1;
}

.details h3{
    margin-bottom:8px;
}

.price{
    color:#2563eb;
    font-weight:bold;
    margin:8px 0;
}

.quantity{
    display:flex;
    align-items:center;
    gap:10px;
}

.quantity input{
    width:60px;
    padding:8px;
    text-align:center;
}

.remove{
    color:#dc2626;
    text-decoration:none;
    font-size:14px;
}

/* Summary */
.summary{
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    height:fit-content;
}

.summary h2{
    margin-bottom:20px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.total{
    font-size:20px;
    font-weight:bold;
    border-top:1px solid #ddd;
    padding-top:15px;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:20px;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

@media(max-width:768px){

.cart{
    grid-template-columns:1fr;
}

.item{
    flex-direction:column;
    text-align:center;
}

.quantity{
    justify-content:center;
}

}
</style>
</head>

<body>

<div class="container">

<h1>Shopping Cart</h1>

<div class="cart">

<!-- Cart Items -->
<div class="cart-items">

<div class="item">
<img src="https://picsum.photos/200?1" alt="Wireless Headphones">

<div class="details">
<h3>Wireless Headphones</h3>
<p>Noise Cancelling Bluetooth Headphones</p>
<div class="price">$89</div>

<div class="quantity">
<label>Qty:</label>
<input type="number" value="1" min="1">
</div>

<a href="#" class="remove">Remove</a>
</div>
</div>

<div class="item">
<img src="https://picsum.photos/200?2" alt="Smart Watch">

<div class="details">
<h3>Smart Watch</h3>
<p>Fitness Tracking Smartwatch</p>
<div class="price">$149</div>

<div class="quantity">
<label>Qty:</label>
<input type="number" value="2" min="1">
</div>

<a href="#" class="remove">Remove</a>
</div>
</div>

</div>

<!-- Order Summary -->
<div class="summary">

<h2>Order Summary</h2>

<div class="row">
<span>Subtotal</span>
<span>$387</span>
</div>

<div class="row">
<span>Shipping</span>
<span>$15</span>
</div>

<div class="row">
<span>Tax</span>
<span>$20</span>
</div>

<div class="row total">
<span>Total</span>
<span>$422</span>
</div>

<button>Proceed to Checkout</button>

</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
    color:#333;
}

/* Header */
header{
    background:#2563eb;
    color:#fff;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:28px;
}

header a{
    color:#fff;
    text-decoration:none;
    background:rgba(255,255,255,.2);
    padding:10px 18px;
    border-radius:8px;
}

/* Container */
.container{
    max-width:1000px;
    margin:40px auto;
    padding:0 20px;
}

/* Card */
.card{
    background:#fff;
    border-radius:15px;
    padding:30px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.card h2{
    margin-bottom:20px;
    color:#2563eb;
}

.group{
    margin-bottom:20px;
}

.group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.group input,
.group select{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:15px;
    outline:none;
}

.group input:focus,
.group select:focus{
    border-color:#2563eb;
}

/* Toggle Switch */
.toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.switch{
    position:relative;
    width:50px;
    height:26px;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    inset:0;
    background:#cbd5e1;
    border-radius:26px;
    cursor:pointer;
    transition:.3s;
}

.slider::before{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    left:3px;
    top:3px;
    background:#fff;
    border-radius:50%;
    transition:.3s;
}

.switch input:checked + .slider{
    background:#2563eb;
}

.switch input:checked + .slider::before{
    transform:translateX(24px);
}

/* Buttons */
.actions{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:25px;
}

.save-btn{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
}

.reset-btn{
    background:#e5e7eb;
    color:#333;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
}

/* Responsive */
@media(max-width:768px){

header{
    flex-direction:column;
    gap:15px;
    text-align:center;
}

.toggle{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
}

.actions{
    flex-direction:column;
}

}
</style>
</head>

<body>

<header>
<h1>Account Settings</h1>
<a href="#">← Dashboard</a>
</header>

<div class="container">

<!-- Profile Settings -->
<div class="card">

<h2>Profile Settings</h2>

<div class="group">
<label>Full Name</label>
<input type="text" value="Admin User">
</div>

<div class="group">
<label>Email Address</label>
<input type="email" value="admin@example.com">
</div>

<div class="group">
<label>Language</label>
<select>
<option>English</option>
<option>தமிழ்</option>
<option>Hindi</option>
<option>Spanish</option>
</select>
</div>

</div>

<!-- Security -->
<div class="card">

<h2>Security</h2>

<div class="group">
<label>Current Password</label>
<input type="password" placeholder="Current Password">
</div>

<div class="group">
<label>New Password</label>
<input type="password" placeholder="New Password">
</div>

<div class="group">
<label>Confirm Password</label>
<input type="password" placeholder="Confirm Password">
</div>

</div>

<!-- Preferences -->
<div class="card">

<h2>Preferences</h2>

<div class="toggle">
<span>Email Notifications</span>
<label class="switch">
<input type="checkbox" checked>
<span class="slider"></span>
</label>
</div>

<div class="toggle">
<span>SMS Notifications</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="toggle">
<span>Two-Factor Authentication</span>
<label class="switch">
<input type="checkbox" checked>
<span class="slider"></span>
</label>
</div>

<div class="toggle">
<span>Dark Mode</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="actions">
<button class="save-btn">Save Changes</button>
<button class="reset-btn" type="reset">Reset</button>
</div>

</div>

</div>

</body>
</html>

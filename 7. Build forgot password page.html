<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:40px;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
}

.icon{
    width:80px;
    height:80px;
    margin:0 auto 20px;
    border-radius:50%;
    background:#eef2ff;
    color:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
}

h2{
    text-align:center;
    color:#1e293b;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#64748b;
    margin-bottom:30px;
    line-height:1.6;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#334155;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.links{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
}

.links a{
    color:#2563eb;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
}

.links a:hover{
    text-decoration:underline;
}

@media(max-width:480px){
    .container{
        padding:30px 24px;
    }

    .links{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="icon">🔒</div>

<h2>Forgot Password?</h2>

<p>
Enter your registered email address and we'll send you a password reset link.
</p>

<form>

<div class="input-group">
<label for="email">Email Address</label>
<input
type="email"
id="email"
placeholder="Enter your email"
required>
</div>

<button type="submit">
Send Reset Link
</button>

</form>

<div class="links">
<a href="#">← Back to Login</a>
<a href="#">Create Account</a>
</div>

</div>

</body>
</html>

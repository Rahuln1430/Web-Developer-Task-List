<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Form Validation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:#fff;
    padding:35px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    color:#2563eb;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#64748b;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

input:valid{
    border-color:#16a34a;
}

input:invalid:not(:placeholder-shown){
    border-color:#dc2626;
}

small{
    color:#64748b;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="container">

<h2>Registration Form</h2>
<p>All fields are required.</p>

<form>

<div class="form-group">
<label for="name">Full Name</label>
<input
type="text"
id="name"
placeholder="John Doe"
required
minlength="3"
maxlength="50">
</div>

<div class="form-group">
<label for="email">Email Address</label>
<input
type="email"
id="email"
placeholder="john@example.com"
required>
</div>

<div class="form-group">
<label for="phone">Phone Number</label>
<input
type="tel"
id="phone"
placeholder="9876543210"
pattern="[0-9]{10}"
required>
<small>Enter exactly 10 digits.</small>
</div>

<div class="form-group">
<label for="password">Password</label>
<input
type="password"
id="password"
placeholder="Minimum 8 characters"
required
minlength="8">
</div>

<div class="form-group">
<label for="age">Age</label>
<input
type="number"
id="age"
min="18"
max="100"
required>
</div>

<button type="submit">
Register
</button>

</form>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    padding:20px;
}

.otp-container{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:40px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    text-align:center;
}

.icon{
    width:80px;
    height:80px;
    margin:0 auto 20px;
    border-radius:50%;
    background:#eef2ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
}

h2{
    color:#1e293b;
    margin-bottom:10px;
}

p{
    color:#64748b;
    line-height:1.6;
    margin-bottom:30px;
}

.otp-inputs{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:25px;
}

.otp-inputs input{
    width:55px;
    height:60px;
    border:2px solid #cbd5e1;
    border-radius:10px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    outline:none;
    transition:.3s;
}

.otp-inputs input:focus{
    border-color:#4f46e5;
    box-shadow:0 0 0 3px rgba(79,70,229,.15);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#4338ca;
}

.resend{
    margin-top:20px;
    color:#64748b;
    font-size:14px;
}

.resend a{
    color:#4f46e5;
    text-decoration:none;
    font-weight:bold;
}

.back{
    margin-top:15px;
}

.back a{
    color:#4f46e5;
    text-decoration:none;
    font-size:14px;
    font-weight:bold;
}

@media(max-width:480px){

    .otp-container{
        padding:30px 20px;
    }

    .otp-inputs{
        gap:8px;
    }

    .otp-inputs input{
        width:45px;
        height:52px;
        font-size:18px;
    }

}
</style>

</head>
<body>

<div class="otp-container">

<div class="icon">🔐</div>

<h2>OTP Verification</h2>

<p>
Enter the 6-digit verification code sent to your registered email or mobile number.
</p>

<form>

<div class="otp-inputs">
<input type="text" maxlength="1" required>
<input type="text" maxlength="1" required>
<input type="text" maxlength="1" required>
<input type="text" maxlength="1" required>
<input type="text" maxlength="1" required>
<input type="text" maxlength="1" required>
</div>

<button type="submit">
Verify OTP
</button>

</form>

<div class="resend">
Didn't receive the code?
<a href="#">Resend OTP</a>
</div>

<div class="back">
<a href="#">← Back to Login</a>
</div>

</div>

</body>
</html>

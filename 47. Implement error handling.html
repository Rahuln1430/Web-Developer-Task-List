<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error Handling Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#0d6efd;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

.message{
    margin-top:20px;
    padding:12px;
    border-radius:6px;
    display:none;
}

.success{
    background:#d4edda;
    color:#155724;
}

.error{
    background:#f8d7da;
    color:#721c24;
}
</style>
</head>

<body>

<div class="container">

<h2>Error Handling Example</h2>

<input
type="number"
id="age"
placeholder="Enter your age">

<button onclick="validateAge()">
Submit
</button>

<div id="message" class="message"></div>

</div>

<script>

function validateAge(){

const age=document.getElementById("age").value;

const message=document.getElementById("message");

message.style.display="block";

try{

if(age===""){
throw new Error("Age is required.");
}

if(isNaN(age)){
throw new Error("Age must be a number.");
}

if(age<18){
throw new Error("You must be at least 18 years old.");
}

message.className="message success";

message.textContent="Validation successful.";

}catch(error){

message.className="message error";

message.textContent=error.message;

}

}

</script>

</body>
</html>

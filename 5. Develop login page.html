<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.login-container{
    width:100%;
    max-width:400px;
    background:#fff;
    padding:40px;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
}

.login-container h2{
    text-align:center;
    color:#1e293b;
    margin-bottom:10px;
}

.login-container p{
    text-align:center;
    color:#64748b;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-weight:600;
}

.input-group input{
    width:100%;
    padding:14px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

.input-group input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#2563eb;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    background:#1d4ed8;
}

.signup{
    margin-top:20px;
    text-align:center;
    color:#64748b;
}

.signup a{
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}

@media(max-width:480px){

.login-container{
    margin:20px;
    padding:30px 25px;
}

}
</style>
</head>
<body>

<div class="login-container">

<h2>Welcome Back</h2>
<p>Sign in to continue to your account</p>

<form>

<div class="input-group">
<label for="email">Email Address</label>
<input
type="email"
id="email"
placeholder="Enter your email"
required>
</div>

<div class="input-group">
<label for="password">Password</label>
<input
type="password"
id="password"
placeholder="Enter your password"
required>
</div>

<div class="options">
<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit" class="login-btn">
Login
</button>

</form>

<div class="signup">
Don't have an account?
<a href="#">Create Account</a>
</div>

</div>

</body>
</html>

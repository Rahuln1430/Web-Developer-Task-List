<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Platform</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#eef2f7;
}

header{
    background:#2563eb;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    position:sticky;
    top:0;
}

.logo{
    font-size:26px;
    font-weight:bold;
}

.search{
    width:300px;
    padding:10px;
    border:none;
    border-radius:8px;
}

.container{
    display:grid;
    grid-template-columns:260px 1fr 300px;
    gap:20px;
    padding:20px;
}

.sidebar,
.rightbar,
.feed{
    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    padding:12px;
    cursor:pointer;
    border-radius:8px;
}

.sidebar li:hover{
    background:#f3f4f6;
}

.sidebar i{
    margin-right:10px;
    color:#2563eb;
}

.post-box textarea{
    width:100%;
    height:90px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    resize:none;
}

.post-box button{
    margin-top:10px;
    padding:10px 20px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.post{
    margin-top:20px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
}

.post h3{
    margin-bottom:8px;
}

.actions{
    margin-top:12px;
}

.actions button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    margin-right:8px;
    cursor:pointer;
}

.like{
    background:#2563eb;
    color:#fff;
}

.comment{
    background:#10b981;
    color:#fff;
}

.share{
    background:#f59e0b;
    color:#fff;
}

.rightbar h3{
    margin-bottom:15px;
}

.trend{
    padding:10px 0;
    border-bottom:1px solid #ddd;
}

@media(max-width:900px){

.container{
    grid-template-columns:1fr;
}

.search{
    width:180px;
}

}
</style>
</head>

<body>

<header>

<div class="logo">
<i class="fas fa-users"></i> SocialHub
</div>

<input class="search" placeholder="Search...">

</header>

<div class="container">

<div class="sidebar">

<ul>
<li><i class="fas fa-home"></i> Home</li>
<li><i class="fas fa-user"></i> Profile</li>
<li><i class="fas fa-user-friends"></i> Friends</li>
<li><i class="fas fa-envelope"></i> Messages</li>
<li><i class="fas fa-bell"></i> Notifications</li>
<li><i class="fas fa-cog"></i> Settings</li>
</ul>

</div>

<div class="feed">

<div class="post-box">

<textarea id="postText"
placeholder="What's on your mind?"></textarea>

<button onclick="createPost()">
Post
</button>

</div>

<div id="posts">

<div class="post">

<h3>Rahul Kumar</h3>

<p>Welcome to our new social media platform! 🎉</p>

<div class="actions">

<button class="like" onclick="likePost(this)">
👍 Like <span>0</span>
</button>

<button class="comment">
💬 Comment
</button>

<button class="share">
🔗 Share
</button>

</div>

</div>

</div>

</div>

<div class="rightbar">

<h3>Trending Topics</h3>

<div class="trend">#WebDevelopment</div>
<div class="trend">#JavaScript</div>
<div class="trend">#AI</div>
<div class="trend">#Programming</div>
<div class="trend">#Technology</div>

</div>

</div>

<script>

function createPost(){

const text=document.getElementById("postText").value.trim();

if(text===""){
alert("Please write something.");
return;
}

const post=document.createElement("div");

post.className="post";

post.innerHTML=`
<h3>You</h3>
<p>${text}</p>

<div class="actions">

<button class="like" onclick="likePost(this)">
👍 Like <span>0</span>
</button>

<button class="comment">
💬 Comment
</button>

<button class="share">
🔗 Share
</button>

</div>
`;

document.getElementById("posts")
.prepend(post);

document.getElementById("postText").value="";

}

function likePost(button){

const count=button.querySelector("span");

count.textContent=parseInt(count.textContent)+1;

}

</script>

</body>
</html>
